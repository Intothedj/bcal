<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캐시 / 포인트 / 게임머니 계산기</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; padding:20px; display:flex; justify-content:center; align-items:center; font-family:Arial,sans-serif; color:#222; background:#f4f6f8; }
    .wrap { width:100%; max-width:560px; padding:28px; border-radius:18px; background:#fff; box-shadow:0 10px 30px rgba(0,0,0,.08); }
    h1 { margin:0 0 20px; text-align:center; font-size:24px; }
    .tabs { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:20px; }
    .tab-btn { margin:0; color:#333; background:#eef1f5; border:1px solid #d6dbe1; }
    .tab-btn.active { color:#fff; background:#4f7cff; border-color:#4f7cff; }
    .section { display:none; }
    .section.active { display:block; }
    .ratio-row { display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:center; margin-bottom:18px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .input-box { margin-bottom:14px; }
    .small-title { margin:18px 0 10px; padding-top:12px; border-top:1px solid #edf0f3; color:#333; font-size:15px; font-weight:bold; }
    label { display:block; margin-bottom:6px; font-size:14px; font-weight:bold; }
    input, select, button { width:100%; padding:13px 14px; border:1px solid #d6dbe1; border-radius:10px; outline:none; font-size:16px; }
    input:focus, select:focus { border-color:#4f7cff; }
    input:disabled, select:disabled { background:#f1f3f5; color:#999; }
    .colon { margin-top:22px; color:#777; font-size:20px; font-weight:bold; }
    button { margin-top:8px; border:none; color:#fff; background:#4f7cff; font-weight:bold; cursor:pointer; }
    button:hover { background:#3f68d8; }
    .result { margin-top:20px; padding:16px; border-radius:12px; background:#f0f4ff; font-size:16px; font-weight:bold; line-height:1.7; word-break:keep-all; white-space:pre-line; }
    .red-text { color:#e60000; }
    @media (max-width:460px) { .grid-2 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>캐시 / 포인트 / 게임머니 계산기</h1>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('ratio', this)">비율 계산</button>
      <button class="tab-btn" onclick="showTab('efficiency', this)">효율 비교</button>
      <button class="tab-btn" onclick="showTab('profit', this)">차익 계산</button>
    </div>

    <div id="ratio" class="section active">
      <div class="ratio-row">
        <div><label for="baseCash">캐시 입력</label><input id="baseCash" class="comma-input" type="text" inputmode="numeric" placeholder="예: 53000" /></div>
        <div class="colon">:</div>
        <div><label for="baseMoney">게임머니 입력</label><input id="baseMoney" class="comma-input" type="text" inputmode="numeric" placeholder="예: 100000000" /></div>
      </div>
      <div class="input-box"><label for="mode">계산 방향</label><select id="mode"><option value="cashToMoney">캐시 → 게임머니</option><option value="moneyToCash">게임머니 → 캐시</option></select></div>
      <div class="input-box"><label for="targetValue">캐시 OR 게임머니 개당가격</label><input id="targetValue" class="comma-input" type="text" inputmode="numeric" placeholder="계산할 개당가격" /></div>
      <div class="input-box"><label for="ratioQuantity">구매 개수</label><input id="ratioQuantity" class="comma-input" type="text" inputmode="numeric" value="1" /></div>
      <div class="small-title">수수료 설정</div>
      <div class="grid-2">
        <div class="input-box"><label for="ratioFeeEnabled">수수료 적용</label><select id="ratioFeeEnabled" onchange="toggleRatioFeeInputs()"><option value="off">비활성화</option><option value="on">활성화</option></select></div>
        <div class="input-box"><label for="ratioFeePercent">수수료 (%)</label><input id="ratioFeePercent" class="percent-input" type="text" inputmode="decimal" value="5" disabled /></div>
      </div>
      <button onclick="calculateRatio()">계산 버튼</button>
      <div id="ratioResult" class="result">결과 : 값을 입력하고 계산 버튼을 눌러주세요.</div>
    </div>

    <div id="efficiency" class="section">
      <div class="small-title">1. 기준 비율 입력</div>
      <div class="grid-2">
        <div class="input-box"><label for="effCash">캐시</label><input id="effCash" class="comma-input" type="text" inputmode="numeric" value="54,000" /></div>
        <div class="input-box"><label for="effCashMoney">해당 게임머니</label><input id="effCashMoney" class="comma-input" type="text" inputmode="numeric" value="100,000,000" /></div>
      </div>
      <div class="grid-2">
        <div class="input-box"><label for="effPoint">포인트</label><input id="effPoint" class="comma-input" type="text" inputmode="numeric" value="68,000" /></div>
        <div class="input-box"><label for="effPointMoney">해당 게임머니</label><input id="effPointMoney" class="comma-input" type="text" inputmode="numeric" value="100,000,000" /></div>
      </div>
      <div class="small-title">2. 개당가격과 구매 개수</div>
      <div class="input-box"><label for="itemQuantity">구매 개수</label><input id="itemQuantity" class="comma-input" type="text" inputmode="numeric" value="1" /></div>
      <div class="grid-2">
        <div class="input-box"><label for="itemMoneyPrice">게임머니 개당가격</label><input id="itemMoneyPrice" class="comma-input" type="text" inputmode="numeric" value="1,200,000" /></div>
        <div class="input-box"><label for="itemPointPrice">포인트 개당가격</label><input id="itemPointPrice" class="comma-input" type="text" inputmode="numeric" value="600" /></div>
      </div>
      <div class="small-title">3. 수수료 설정</div>
      <div class="grid-2">
        <div class="input-box"><label for="feeEnabled">수수료 적용</label><select id="feeEnabled" onchange="toggleFeeInputs()"><option value="off">비활성화</option><option value="on">활성화</option></select></div>
        <div class="input-box"><label for="feePercent">수수료 (%)</label><input id="feePercent" class="percent-input" type="text" inputmode="decimal" value="5" disabled /></div>
      </div>
      <div class="input-box"><label for="feeTarget">수수료 차감 대상</label><select id="feeTarget" disabled><option value="money">게임머니 금액에서 차감</option><option value="point">포인트 금액에서 차감</option><option value="both">둘 다 차감</option></select></div>
      <button onclick="compareEfficiency()">어떤 구매가 더 저렴한지 계산</button>
      <div id="efficiencyResult" class="result">결과 : 기준 비율과 개당가격을 입력해주세요.</div>
    </div>

    <div id="profit" class="section">
      <div class="small-title">1. 실제 캐시 충전 원가</div>
      <div class="grid-2">
        <div class="input-box"><label for="profitBundleCash">묶음 캐시 가격</label><input id="profitBundleCash" class="comma-input" type="text" inputmode="numeric" placeholder="예: 10000" /></div>
        <div class="input-box"><label for="profitDiscount">캐시 충전 할인율 (%)</label><input id="profitDiscount" class="percent-input" type="text" inputmode="decimal" value="7" /></div>
      </div>
      <div class="grid-2">
        <div class="input-box"><label for="profitItemsPerBundle">묶음당 아이템 개수</label><input id="profitItemsPerBundle" class="comma-input" type="text" inputmode="numeric" value="1" placeholder="예: 30" /></div>
        <div class="input-box"><label for="profitBundleCount">구매 묶음 수</label><input id="profitBundleCount" class="comma-input" type="text" inputmode="numeric" value="1" placeholder="예: 2" /></div>
      </div>
      <div class="small-title">2. 게임머니 판매 정보</div>
      <div class="grid-2">
        <div class="input-box"><label for="profitSaleMoney">개당 판매가 (게임머니)</label><input id="profitSaleMoney" class="comma-input" type="text" inputmode="numeric" placeholder="예: 25000000" /></div>
        <div class="input-box"><label for="profitSaleFee">판매 수수료 (%)</label><input id="profitSaleFee" class="percent-input" type="text" inputmode="decimal" value="0" /></div>
      </div>
      <div class="small-title">3. 게임머니 현금 환산 비율</div>
      <div class="grid-2">
        <div class="input-box"><label for="profitMoneyUnit">기준 게임머니</label><input id="profitMoneyUnit" class="comma-input" type="text" inputmode="numeric" value="100,000,000" /></div>
        <div class="input-box"><label for="profitWonValue">해당 현금 가치 (원)</label><input id="profitWonValue" class="comma-input" type="text" inputmode="numeric" placeholder="예: 54000" /></div>
      </div>
      <button onclick="calculateProfit()">수익률 계산</button>
      <div id="profitResult" class="result">결과 : 원가, 판매가, 환산 비율을 입력해주세요.</div>
    </div>
  </div>

  <script>
    function onlyNumber(value) { return Number(String(value).replace(/,/g, '').trim()); }
    function formatNumber(value) { return Math.round(value).toLocaleString('ko-KR'); }
    function formatDecimal(value) { return Number(value.toFixed(2)).toLocaleString('ko-KR'); }

    function showTab(tabId, button) {
      document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      button.classList.add('active');
    }

    function toggleRatioFeeInputs() { document.getElementById('ratioFeePercent').disabled = document.getElementById('ratioFeeEnabled').value !== 'on'; }
    function toggleFeeInputs() {
      const enabled = document.getElementById('feeEnabled').value === 'on';
      document.getElementById('feePercent').disabled = !enabled;
      document.getElementById('feeTarget').disabled = !enabled;
    }

    function calculateRatio() {
      const baseCash = onlyNumber(document.getElementById('baseCash').value);
      const baseMoney = onlyNumber(document.getElementById('baseMoney').value);
      const unitValue = onlyNumber(document.getElementById('targetValue').value);
      const quantity = onlyNumber(document.getElementById('ratioQuantity').value) || 1;
      const feeEnabled = document.getElementById('ratioFeeEnabled').value === 'on';
      const feePercent = onlyNumber(document.getElementById('ratioFeePercent').value) || 0;
      const mode = document.getElementById('mode').value;
      const result = document.getElementById('ratioResult');

      if (!baseCash || !baseMoney || !unitValue) return result.textContent = '결과 : 기준 비율과 개당가격을 모두 입력해주세요.';
      if (baseCash <= 0 || baseMoney <= 0 || unitValue <= 0 || quantity <= 0 || feePercent < 0 || feePercent >= 100) return result.textContent = '결과 : 입력값을 확인해주세요.';

      const originalTotal = unitValue * quantity;
      const appliedTotal = originalTotal * (feeEnabled ? 1 - feePercent / 100 : 1);
      const feeText = feeEnabled ? `수수료 : ${formatDecimal(feePercent)}% 차감 적용\n` : '수수료 : 미적용\n';

      if (mode === 'cashToMoney') {
        const gameMoney = appliedTotal * baseMoney / baseCash;
        result.textContent = `개당가격 : ${formatDecimal(unitValue)} 캐시\n수량 : ${formatNumber(quantity)}개\n차감 전 총액 : ${formatDecimal(originalTotal)} 캐시\n${feeText}적용 총액 : ${formatDecimal(appliedTotal)} 캐시\n\n결과 : ${formatDecimal(appliedTotal)} 캐시에 해당하는 게임머니는 ${formatNumber(gameMoney)} 입니다.`;
      } else {
        const cash = appliedTotal * baseCash / baseMoney;
        result.textContent = `개당가격 : ${formatDecimal(unitValue)} 게임머니\n수량 : ${formatNumber(quantity)}개\n차감 전 총액 : ${formatDecimal(originalTotal)} 게임머니\n${feeText}적용 총액 : ${formatDecimal(appliedTotal)} 게임머니\n\n결과 : ${formatDecimal(appliedTotal)} 게임머니에 해당하는 캐시는 ${formatDecimal(cash)} 입니다.`;
      }
    }

    function compareEfficiency() {
      const cash = onlyNumber(document.getElementById('effCash').value);
      const cashMoney = onlyNumber(document.getElementById('effCashMoney').value);
      const point = onlyNumber(document.getElementById('effPoint').value);
      const pointMoney = onlyNumber(document.getElementById('effPointMoney').value);
      const itemMoneyPrice = onlyNumber(document.getElementById('itemMoneyPrice').value);
      const itemPointPrice = onlyNumber(document.getElementById('itemPointPrice').value);
      const quantity = onlyNumber(document.getElementById('itemQuantity').value) || 1;
      const feeEnabled = document.getElementById('feeEnabled').value === 'on';
      const feePercent = onlyNumber(document.getElementById('feePercent').value) || 0;
      const feeTarget = document.getElementById('feeTarget').value;
      const result = document.getElementById('efficiencyResult');

      if (!cash || !cashMoney || !point || !pointMoney || !itemMoneyPrice || !itemPointPrice) return result.textContent = '결과 : 기준 비율과 개당가격을 모두 입력해주세요.';
      if ([cash, cashMoney, point, pointMoney, itemMoneyPrice, itemPointPrice, quantity].some(v => v <= 0) || feePercent < 0 || feePercent >= 100) return result.textContent = '결과 : 입력값을 확인해주세요.';

      const cashPerMoney = cash / cashMoney;
      const cashPerPoint = (pointMoney / point) * cashPerMoney;
      let totalMoneyPrice = itemMoneyPrice * quantity;
      let totalPointPrice = itemPointPrice * quantity;

      if (feeEnabled) {
        const multiplier = 1 - feePercent / 100;
        if (feeTarget === 'money' || feeTarget === 'both') totalMoneyPrice *= multiplier;
        if (feeTarget === 'point' || feeTarget === 'both') totalPointPrice *= multiplier;
      }

      const moneyValue = totalMoneyPrice * cashPerMoney;
      const pointValue = totalPointPrice * cashPerPoint;
      const diff = Math.abs(moneyValue - pointValue);
      let verdict = '둘 다 같은 가격입니다.';
      if (moneyValue < pointValue) verdict = `<span class="red-text">게임머니</span>로 구매하는 게 더 <span class="red-text">저렴합니다</span>.\n약 ${formatDecimal(diff)} 캐시만큼 이득입니다.`;
      if (pointValue < moneyValue) verdict = `<span class="red-text">포인트</span>로 구매하는 게 더 <span class="red-text">저렴합니다</span>.\n약 ${formatDecimal(diff)} 캐시만큼 이득입니다.`;

      result.innerHTML = `수량 : ${formatNumber(quantity)}개\n게임머니 총액 : ${formatDecimal(totalMoneyPrice)}\n포인트 총액 : ${formatDecimal(totalPointPrice)}\n게임머니 구매 환산가 : 약 ${formatDecimal(moneyValue)} 캐시\n포인트 구매 환산가 : 약 ${formatDecimal(pointValue)} 캐시\n\n${verdict}`;
    }

    function calculateProfit() {
      const bundleCash = onlyNumber(document.getElementById('profitBundleCash').value);
      const itemsPerBundle = onlyNumber(document.getElementById('profitItemsPerBundle').value) || 1;
      const bundleCount = onlyNumber(document.getElementById('profitBundleCount').value) || 1;
      const discount = onlyNumber(document.getElementById('profitDiscount').value) || 0;
      const saleMoney = onlyNumber(document.getElementById('profitSaleMoney').value);
      const saleFee = onlyNumber(document.getElementById('profitSaleFee').value) || 0;
      const moneyUnit = onlyNumber(document.getElementById('profitMoneyUnit').value);
      const wonValue = onlyNumber(document.getElementById('profitWonValue').value);
      const result = document.getElementById('profitResult');

      if (!bundleCash || !saleMoney || !moneyUnit || !wonValue) return result.textContent = '결과 : 묶음 가격, 개당 판매가, 환산 비율을 모두 입력해주세요.';
      if ([bundleCash, itemsPerBundle, bundleCount, saleMoney, moneyUnit, wonValue].some(v => v <= 0) || discount < 0 || discount >= 100 || saleFee < 0 || saleFee >= 100) return result.textContent = '결과 : 입력값을 확인해주세요.';

      const totalItemCount = itemsPerBundle * bundleCount;
      const originalCashCost = bundleCash * bundleCount;
      const actualCost = originalCashCost * (1 - discount / 100);
      const grossMoney = saleMoney * totalItemCount;
      const netMoney = grossMoney * (1 - saleFee / 100);
      const cashoutValue = netMoney * wonValue / moneyUnit;
      const profit = cashoutValue - actualCost;
      const profitRate = profit / actualCost * 100;
      const breakEven = actualCost * moneyUnit / wonValue / (1 - saleFee / 100);
      const verdict = profit >= 0
        ? `<span class="red-text">수익</span>입니다. 약 <span class="red-text">${formatDecimal(profitRate)}%</span> 남습니다.`
        : `<span class="red-text">손실</span>입니다. 약 <span class="red-text">${formatDecimal(Math.abs(profitRate))}%</span> 부족합니다.`;

      const breakEvenUnitSaleMoney = breakEven / totalItemCount;

      result.innerHTML = `묶음 캐시 가격 : ${formatDecimal(bundleCash)} 캐시
구매 묶음 수 : ${formatNumber(bundleCount)}개
묶음당 수량 : ${formatNumber(itemsPerBundle)}개
총 판매 수량 : ${formatNumber(totalItemCount)}개
차감 전 캐시 원가 : ${formatDecimal(originalCashCost)} 캐시
할인 충전 적용 원가 : ${formatDecimal(actualCost)} 원
개당 판매가 : ${formatDecimal(saleMoney)} 게임머니
수수료 차감 전 판매액 : ${formatDecimal(grossMoney)} 게임머니
판매 후 수령 게임머니 : ${formatDecimal(netMoney)}
게임머니 현금 환산가 : ${formatDecimal(cashoutValue)} 원
순이익 : ${formatDecimal(profit)} 원
손익분기 개당 판매가 : 약 ${formatDecimal(breakEvenUnitSaleMoney)} 게임머니

${verdict}`;
    }

    document.querySelectorAll('.comma-input').forEach(input => {
      input.addEventListener('input', () => {
        const raw = input.value.replace(/[^0-9]/g, '');
        input.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
      });
    });

    document.querySelectorAll('.percent-input').forEach(input => {
      input.addEventListener('input', () => {
        let raw = input.value.replace(/[^0-9.]/g, '');
        const parts = raw.split('.');
        if (parts.length > 2) raw = `${parts.shift()}.${parts.join('')}`;
        input.value = raw;
      });
    });
  </script>
</body>
</html>
