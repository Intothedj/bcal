<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캐시 비율 계산기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      background: #fff;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 24px;
      text-align: center;
    }

    .ratio-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, select, button {
      width: 100%;
      padding: 13px 14px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d6dbe1;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #4f7cff;
    }

    .colon {
      margin-top: 22px;
      font-size: 20px;
      font-weight: bold;
      color: #777;
    }

    .input-box {
      margin-bottom: 14px;
    }

    button {
      margin-top: 8px;
      border: none;
      background: #4f7cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #3f68d8;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #f0f4ff;
      line-height: 1.5;
      font-size: 16px;
      font-weight: bold;
      word-break: keep-all;
    }

    .hint {
      margin-top: 12px;
      color: #666;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>캐시 비율 계산기</h1>

    <div class="ratio-row">
      <div>
        <label for="baseCash">캐시 입력</label>
        <input id="baseCash" type="text" inputmode="numeric" placeholder="예: 53000" />
      </div>

      <div class="colon">:</div>

      <div>
        <label for="baseMoney">게임머니 입력</label>
        <input id="baseMoney" type="text" inputmode="numeric" placeholder="예: 100000000" />
      </div>
    </div>

    <div class="input-box">
      <label for="mode">계산 방향</label>
      <select id="mode">
        <option value="cashToMoney">캐시 → 게임머니</option>
        <option value="moneyToCash">게임머니 → 캐시</option>
      </select>
    </div>

    <div class="input-box">
      <label for="targetValue">캐시 OR 게임머니</label>
      <input id="targetValue" type="text" inputmode="numeric" placeholder="계산할 값을 입력하세요" />
    </div>

    <button onclick="calculate()">계산 버튼</button>

    <div id="result" class="result">결과 : 값을 입력하고 계산 버튼을 눌러주세요.</div>

    <div class="hint">
      예시: 캐시 53,000원이 게임머니 1억이면<br />
      기준값에 53000 : 100000000 을 입력하면 됩니다.
    </div>
  </div>

  <script>
    function onlyNumber(value) {
      return Number(String(value).replace(/,/g, '').trim());
    }

    function formatNumber(value) {
      return Math.round(value).toLocaleString('ko-KR');
    }

    function calculate() {
      const baseCash = onlyNumber(document.getElementById('baseCash').value);
      const baseMoney = onlyNumber(document.getElementById('baseMoney').value);
      const targetValue = onlyNumber(document.getElementById('targetValue').value);
      const mode = document.getElementById('mode').value;
      const result = document.getElementById('result');

      if (!baseCash || !baseMoney || !targetValue) {
        result.textContent = '결과 : 기준 캐시, 기준 게임머니, 계산할 값을 모두 입력해주세요.';
        return;
      }

      if (baseCash <= 0 || baseMoney <= 0 || targetValue <= 0) {
        result.textContent = '결과 : 0보다 큰 숫자만 입력해주세요.';
        return;
      }

      if (mode === 'cashToMoney') {
        const gameMoney = targetValue * baseMoney / baseCash;
        result.textContent = `결과 : ${formatNumber(targetValue)} 캐시에 해당하는 게임머니는 ${formatNumber(gameMoney)} 입니다.`;
      } else {
        const cash = targetValue * baseCash / baseMoney;
        result.textContent = `결과 : ${formatNumber(targetValue)} 게임머니에 해당하는 캐시는 ${formatNumber(cash)} 입니다.`;
      }
    }

    // 입력할 때 자동으로 콤마 표시
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', () => {
        const raw = input.value.replace(/[^0-9]/g, '');
        input.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
      });
    });
  </script>
</body>
</html>
